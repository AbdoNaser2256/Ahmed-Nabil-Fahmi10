<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .tooth-outline { fill: none; stroke: url(#gradient); stroke-width: 80; stroke-linecap: round; stroke-linejoin: round; }
      .tooth-highlight { fill: none; stroke: url(#gradient); stroke-width: 40; stroke-linecap: round; }
    </style>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A8A8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tooth outline -->
  <path class="tooth-outline" d="M 300 200 Q 250 250 250 350 L 250 700 Q 250 800 350 850 L 512 900 L 674 850 Q 774 800 774 700 L 774 350 Q 774 250 724 200 Q 650 150 512 150 Q 374 150 300 200 Z"/>
  
  <!-- Tooth highlight/shine -->
  <path class="tooth-highlight" d="M 380 250 Q 350 300 350 400"/>
  
  <!-- Smile curve at top -->
  <path class="tooth-highlight" d="M 350 200 Q 512 100 674 200"/>
</svg>
